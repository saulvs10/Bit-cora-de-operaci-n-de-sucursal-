<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#09111f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Bitácora Operativa</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#09111f;--card:#0f1d30;--border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.15);
  --text:#e8eaf0;--muted:rgba(232,234,240,.45);--blue:#3b82f6;--green:#22c55e;
  --amber:#f59e0b;--red:#ef4444;--radius:14px;--fz:16px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:var(--fz);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:10px;
  padding:calc(env(safe-area-inset-top,0px) + 10px) 14px 10px;
  background:rgba(9,17,31,.96);border-bottom:1px solid var(--border);backdrop-filter:blur(14px);}
.topbar__meta{flex:1;min-width:0;}
.topbar__title{font-weight:800;font-size:17px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar__sub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.iconBtn{width:46px;height:46px;flex-shrink:0;border-radius:11px;border:1px solid var(--border2);
  background:rgba(255,255,255,.07);color:var(--text);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
/* MAIN */
#app{padding:14px 14px calc(env(safe-area-inset-bottom,0px) + 140px);max-width:600px;margin:0 auto;}
/* TABBAR */
.tabBar{position:fixed;bottom:0;left:0;right:0;display:none;
  background:rgba(9,17,31,.97);border-top:1px solid var(--border);backdrop-filter:blur(14px);
  padding-bottom:env(safe-area-inset-bottom,0px);z-index:38;}
.tabBar.show{display:flex;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  padding:9px 2px 11px;color:var(--muted);border:none;background:transparent;
  font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.02em;position:relative;
  -webkit-tap-highlight-color:transparent;transition:color .15s;}
.tab.on{color:var(--blue);}
.tab.on::after{content:"";position:absolute;top:0;left:20%;right:20%;height:2px;
  background:var(--blue);border-radius:0 0 2px 2px;}
.tab__icon{font-size:20px;line-height:1;}
.tab__label{max-width:56px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tab__dot{width:5px;height:5px;border-radius:50%;background:transparent;transition:background .2s;}
.tab__dot.g{background:var(--green);} .tab__dot.w{background:var(--amber);}
/* FOOTER */
.footer{display:none;position:fixed;left:0;right:0;z-index:40;
  background:rgba(9,17,31,.96);border-top:1px solid var(--border);backdrop-filter:blur(14px);
  padding:10px 14px;bottom:calc(58px + env(safe-area-inset-bottom,0px));}
.footer.show{display:block;}
.footer__inner{max-width:600px;margin:0 auto;display:flex;gap:10px;}
/* SHEET */
.sheetBack{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:60;display:none;}
.sheetBack.show{display:block;}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;
  background:#0d1b2e;border-radius:20px 20px 0 0;border-top:1px solid var(--border2);
  max-height:90dvh;display:none;flex-direction:column;}
.sheet.show{display:flex;}
.sheet__grip{width:36px;height:4px;border-radius:2px;background:var(--border2);
  margin:10px auto 0;flex-shrink:0;}
.sheet__body{overflow-y:auto;padding:14px 16px 20px;
  padding-bottom:calc(20px + env(safe-area-inset-bottom,0px));}
/* PHOTO VIEWER */
.viewer{position:fixed;inset:0;z-index:100;background:#000;display:none;flex-direction:column;}
.viewer.show{display:flex;}
.viewer__top{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;
  align-items:center;padding:calc(env(safe-area-inset-top,0px)+12px) 16px 12px;
  background:linear-gradient(rgba(0,0,0,.6),transparent);z-index:2;}
.viewer__counter{font-size:15px;font-weight:700;background:rgba(0,0,0,.4);
  padding:6px 14px;border-radius:20px;}
.viewer__close{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.25);
  background:rgba(0,0,0,.4);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.viewer__stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;touch-action:none;}
.viewer__spinner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.5);font-size:13px;display:none;}
.viewer__spinner.show{display:flex;}
@keyframes spin{to{transform:rotate(360deg)}}
.viewer__spinner::before{content:"";width:28px;height:28px;border:2px solid rgba(255,255,255,.2);
  border-top-color:rgba(255,255,255,.7);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;}
.viewer__img{max-width:100%;max-height:100%;object-fit:contain;}
.viewer__nav{position:absolute;top:50%;transform:translateY(-50%);
  width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,.2);
  background:rgba(0,0,0,.35);color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.viewer__nav.prev{left:8px;} .viewer__nav.next{right:8px;}
.viewer__bottom{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:center;gap:12px;
  padding:16px 16px calc(16px + env(safe-area-inset-bottom,0px));
  background:linear-gradient(transparent,rgba(0,0,0,.6));}
.viewer__btn{padding:10px 22px;border-radius:10px;border:1px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.1);color:#fff;font-size:14px;font-weight:600;cursor:pointer;backdrop-filter:blur(8px);}
/* CARDS & LAYOUT */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;margin-bottom:12px;}
.card h2{font-size:17px;font-weight:800;margin-bottom:10px;}
.card h3{font-size:14px;font-weight:700;margin-bottom:6px;}
.kpi{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.badge{display:inline-flex;align-items:center;padding:5px 11px;border-radius:999px;
  font-size:12px;font-weight:700;border:1px solid var(--border2);background:rgba(255,255,255,.06);}
.badge.g{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.35);color:#86efac;}
.badge.w{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.35);color:#fde68a;}
.badge.r{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.35);color:#fca5a5;}
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;
  font-size:11px;font-weight:700;border:1px solid var(--border2);background:rgba(255,255,255,.06);}
.pill.g{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.35);color:#86efac;}
.pill.w{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.35);color:#fde68a;}
.pill.r{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.35);color:#fca5a5;}
.row{display:flex;gap:10px;}
.hr{height:1px;background:var(--border);margin:14px 0;}
.small{font-size:13px;color:var(--muted);}
.muted{color:var(--muted);}
/* FORMS */
.label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.04em;margin:14px 0 6px;}
.input,.textarea,.select{width:100%;min-height:52px;border-radius:var(--radius);
  border:1.5px solid var(--border2);background:rgba(255,255,255,.06);
  padding:12px 14px;color:var(--text);font-size:var(--fz);outline:none;
  transition:border-color .15s;-webkit-appearance:none;}
.input:focus,.textarea:focus,.select:focus{border-color:var(--blue);}
.textarea{min-height:90px;resize:vertical;}
.input::placeholder,.textarea::placeholder{color:var(--muted);}
/* BUTTONS */
.btn{width:100%;min-height:54px;border-radius:var(--radius);border:1.5px solid var(--border2);
  background:rgba(255,255,255,.07);color:var(--text);font-size:var(--fz);font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:opacity .15s,transform .1s;-webkit-tap-highlight-color:transparent;}
.btn:active{transform:scale(.97);}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff;}
.btn.good{background:rgba(34,197,94,.2);border-color:rgba(34,197,94,.5);color:#86efac;}
.btn.danger{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.4);color:#fca5a5;}
.btn.sm{min-height:38px;font-size:13px;padding:0 14px;width:auto;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
/* PROGRESS */
.progWrap{margin:8px 0;}
.progBar{width:100%;height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;}
.progFill{height:100%;background:var(--blue);border-radius:4px;transition:width .4s;}
/* PHOTO CARDS */
.photoStack{display:flex;flex-direction:column;gap:10px;}
.photoCard{border-radius:12px;overflow:hidden;background:rgba(255,255,255,.04);border:1px solid var(--border);}
.photoCard__img{width:100%;max-height:260px;object-fit:contain;display:block;cursor:pointer;background:#000;}
.photoCard__bar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;gap:8px;}
.photoCard__time{font-size:12px;color:var(--muted);}
.photoAdd{width:100%;min-height:80px;border:2px dashed var(--border2);border-radius:12px;
  background:rgba(255,255,255,.03);color:var(--muted);font-size:14px;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;}
.photoAdd:active{background:rgba(255,255,255,.07);}
.photoAdd__icon{font-size:24px;}
/* LIST ITEMS */
.listItem{border-bottom:1px solid var(--border);padding:12px 0;}
.listItem:last-child{border-bottom:none;}
.listItem__top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.listItem__title{font-weight:700;font-size:15px;line-height:1.3;}
/* CHECKLIST */
.checkItem{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;
  -webkit-tap-highlight-color:transparent;}
.checkItem:last-child{border-bottom:none;}
.checkBox{width:28px;height:28px;border-radius:8px;border:2px solid var(--border2);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;
  transition:all .15s;margin-top:2px;}
.checkItem.done .checkBox{background:var(--green);border-color:var(--green);color:#fff;}
.checkItem__body{flex:1;}
.checkItem__label{font-weight:600;font-size:15px;line-height:1.4;}
.checkItem__meta{font-size:12px;color:var(--muted);margin-top:3px;}
/* INVENTORY */
.invRow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.invRow:last-child{border-bottom:none;}
.invRow__check{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.invRow.done .invRow__check{background:var(--green);border-color:var(--green);color:#fff;font-size:14px;}
.invRow.diff .invRow__check{background:rgba(239,68,68,.2);border-color:var(--red);}
.invRow__body{flex:1;min-width:0;}
.invRow__name{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.invRow__id{font-size:12px;color:var(--muted);margin-top:1px;}
.invRow__counts{display:flex;gap:14px;margin-top:6px;}
.invCount{text-align:center;}
.invCount__val{font-weight:800;font-size:16px;}
.invCount__lbl{font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:.04em;}
.invStats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0;}
.invStat{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;}
.invStat__val{font-size:22px;font-weight:800;}
.invStat__lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-top:2px;}
.filterTabs{display:flex;gap:6px;margin-bottom:12px;}
.fTab{flex:1;padding:8px 4px;border-radius:8px;border:1px solid var(--border2);
  background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.fTab.on{background:rgba(59,130,246,.2);border-color:rgba(59,130,246,.5);color:#93c5fd;}
/* SALES */
.statBox{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.statBox__val{font-size:18px;font-weight:800;}
.statBox__lbl{font-size:11px;color:var(--muted);margin-top:2px;}
/* SKU SEARCH */
.skuResults{margin-top:8px;border-radius:12px;border:1px solid var(--border2);
  background:#0a1628;overflow:auto;max-height:36vh;}
.skuResultsMeta{padding:8px 12px;font-size:12px;color:var(--muted);}
.skuResultItem{padding:10px 12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.05);}
.skuResultItem:active,.skuResultItem.sel{background:rgba(59,130,246,.15);}
.skuResultItem:last-child{border-bottom:none;}
.skuPrimary{font-weight:700;font-size:14px;}
.skuSecondary{font-size:12px;color:var(--muted);margin-top:1px;}
.skuMark{color:var(--blue);background:rgba(59,130,246,.15);border-radius:3px;padding:0 2px;}
/* SHIFT GRID */
.shiftGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.shiftBox{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;text-align:center;}
.shiftBox__no{font-size:20px;font-weight:800;margin-bottom:4px;}
.shiftBox__time{font-size:12px;color:var(--muted);margin-bottom:8px;}
.shiftBox__st{display:inline-block;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:700;}
.shiftBox__st.avail{background:rgba(255,255,255,.06);color:var(--muted);}
.shiftBox__st.open{background:rgba(34,197,94,.15);color:#86efac;}
.shiftBox__st.closed{background:rgba(239,68,68,.1);color:#fca5a5;}
/* DIFF PREVIEW */
#diffPreview{text-align:center;padding:10px;border-radius:10px;min-height:42px;
  font-weight:700;font-size:16px;transition:all .2s;margin:8px 0;}
/* TOAST */
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(90px + env(safe-area-inset-bottom,0px));
  background:rgba(20,30,50,.95);color:#fff;padding:10px 20px;border-radius:10px;
  font-size:14px;font-weight:600;white-space:nowrap;z-index:200;
  opacity:0;transition:opacity .2s;pointer-events:none;max-width:90vw;text-align:center;}
.toast.show{opacity:1;}
/* REPORT IFRAME */
.reportWrap{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);height:70vh;}
.reportFrame{width:100%;height:100%;border:none;}
/* INPUTWRAP */
.inputWrap{position:relative;}
.inputWrap .input{padding-right:44px;}
.clearBtn{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:6px;}
.clearBtn.hidden{display:none;}
</style>
</head>
<body>
<header class="topbar">
  <button id="backBtn" class="iconBtn" title="Atrás">&#8592;</button>
  <div class="topbar__meta">
    <div class="topbar__title">Bitácora Operativa</div>
    <div id="topbarSub" class="topbar__sub">Cargando&hellip;</div>
  </div>
</header>
<main id="app"></main>
<nav id="tabBar" class="tabBar"></nav>
<div id="footerEl" class="footer"><div id="footerInner" class="footer__inner"></div></div>
<div id="sheetBack" class="sheetBack"></div>
<div id="sheetEl" class="sheet"><div class="sheet__grip"></div><div id="sheetBody" class="sheet__body"></div></div>
<div id="viewer" class="viewer">
  <div class="viewer__top">
    <span id="vCounter" class="viewer__counter">1/1</span>
    <button id="vClose" class="viewer__close">&#10005;</button>
  </div>
  <div class="viewer__stage">
    <div id="vSpinner" class="viewer__spinner">Cargando</div>
    <button id="vPrev" class="viewer__nav prev">&#8249;</button>
    <img id="vImg" draggable="false" class="viewer__img"/>
    <button id="vNext" class="viewer__nav next">&#8250;</button>
  </div>
  <div class="viewer__bottom">
    <button id="vShare" class="viewer__btn">&#8679; Compartir</button>
  </div>
</div>
<div id="toastEl" class="toast"></div>
<input id="csvPicker" type="file" accept=".csv,text/csv" style="display:none"/>
<script>
(() => {
"use strict";

/* ════════════════════════════════════════════════════════════
   CONSTANTS
════════════════════════════════════════════════════════════ */
const TURNS_KEY   = "bitacora_turns_v1";
const PHOTOS_KEY  = "bitacora_photos_v1";
const CATALOG_KEY = "bitacora_catalog_v1";
const SHIFT_TIMES = { 1:"08:00–16:00", 2:"13:00–21:00" };

const CHECKLIST_OPENING = [
  "Luces encendidas","Cajas listas y con cambio","Limpieza general",
  "Bolsas disponibles","Terminal / POS funcionando","Precios visibles",
  "Anaqueles ordenados","Revisión de caducidades","Área de frutas/verduras",
  "Cámara fría verificada","Congeladores verificados","Alta rotación completa",
  "Promociones señalizadas","Basura retirada","Baños limpios",
  "Entrada despejada","Bitácora anterior revisada","Asignación de tareas"
].map((label,i)=>({id:"op_"+(i+1),label}));

const CHECKLIST_CLOSING = [
  "Limpieza del piso de venta","Limpieza de caja y mostrador","Basura retirada",
  "Cámaras frías cerradas","Congeladores verificados","Luces secundarias apagadas",
  "Anaqueles ordenados y surtidos","Alta rotación revisada","Caducidades del día",
  "Efectivo asegurado / entregado","Terminal POS apagada","Accesos asegurados",
  "Mermas registradas","Pendientes anotados en bitácora","Siguiente turno notificado"
].map((label,i)=>({id:"cl_"+(i+1),label}));

const WASTE_REASONS = ["Caducado","Roto / dañado","Derrame","Empaque abierto",
  "Merma operacional","Robo / Merma desconocida","Diferencia de inventario","Otro"];

const DEVOLUCION_MOTIVOS = ["Producto caducado","Producto dañado","Producto incorrecto",
  "Precio incorrecto","Cantidad incorrecta","Error de cajero","No solicitado","Otro"];

const LIMITS = { opPhoto:1, receiptPhotos:5, receiptEvidPhotos:5,
  wastePhotos:3, salesPhotos:5 };

/* ════════════════════════════════════════════════════════════
   STORAGE
════════════════════════════════════════════════════════════ */
let appState = loadState();
let photoStore = loadPhotos();
let catalogStore = loadCatalog();

function loadState(){
  try{ const r=localStorage.getItem(TURNS_KEY); return r?JSON.parse(r):{days:{}}; }
  catch(e){ return {days:{}}; }
}
function saveState(){
  try{ localStorage.setItem(TURNS_KEY, JSON.stringify(appState)); return true; }
  catch(e){ alert("Storage lleno.\n"+e?.message); return false; }
}
function loadPhotos(){
  try{ const r=localStorage.getItem(PHOTOS_KEY); return r?JSON.parse(r):{}; }
  catch(e){ return {}; }
}
function savePhotos(){
  try{ localStorage.setItem(PHOTOS_KEY, JSON.stringify(photoStore)); }
  catch(e){ alert("Storage de fotos lleno.\n"+e?.message); }
}
function loadCatalog(){
  try{ const r=localStorage.getItem(CATALOG_KEY); return r?JSON.parse(r):{rows:[],source:"",importedAt:null}; }
  catch(e){ return {rows:[],source:"",importedAt:null}; }
}
function saveCatalog(){
  try{ localStorage.setItem(CATALOG_KEY, JSON.stringify(catalogStore)); }
  catch(e){ alert("Error guardando catálogo.\n"+e?.message); }
}

/* ── Photo store ── */
function storePhoto(dataUrl, ts){
  const id = uid(); photoStore[id] = dataUrl; savePhotos();
  return {id, ts: ts||nowISO()};
}
function photoSrc(p){
  if(!p) return "";
  if(p.dataUrl) return p.dataUrl; // legacy
  return photoStore[p.id]||"";
}
function migrArr(arr){
  if(!Array.isArray(arr)) return arr;
  return arr.map(p=>p&&p.dataUrl?storePhoto(p.dataUrl,p.ts):p);
}

/* ── Purge old data ── */
function purgeOldData(){
  const cutoff = Date.now() - 7*24*60*60*1000;
  const keep = new Set();
  for(const dk in appState.days){
    try{
      if(parseDateKey(dk).getTime() < cutoff){ delete appState.days[dk]; continue; }
      collectIds(appState.days[dk], keep);
    }catch(e){}
  }
  let freed=0;
  for(const id in photoStore){ if(!keep.has(id)){ delete photoStore[id]; freed++; } }
  if(freed>0||Object.keys(appState.days).length<Object.keys(appState.days).length){
    saveState(); savePhotos();
    if(freed>3) toast(`🧹 ${freed} fotos antiguas liberadas`);
  }
}
function collectIds(day, set){
  for(const sl in day.turns||{}){
    const t=day.turns[sl]; if(!t) continue;
    t.modules?.operation?.items?.forEach(it=>it.photos?.forEach(p=>p?.id&&set.add(p.id)));
    (t.modules?.purchases?.receipts||[]).forEach(r=>{
      r.photos?.forEach(p=>p?.id&&set.add(p.id));
      r.incEvidencePhotos?.forEach(p=>p?.id&&set.add(p.id));
      r.incidences?.forEach(x=>x.incPhoto?.id&&set.add(x.incPhoto.id));
      r.newProducts?.forEach(np=>{np.photoFront?.id&&set.add(np.photoFront.id);np.photoBarcode?.id&&set.add(np.photoBarcode.id);});
    });
    t.modules?.inventory?.waste?.forEach(w=>w.photos?.forEach(p=>p?.id&&set.add(p.id)));
    t.modules?.sales?.photos?.forEach(p=>p?.id&&set.add(p.id));
    t.modules?.sales?.withdrawals?.forEach(w=>w.photos?.forEach(p=>p?.id&&set.add(p.id)));
  }
}
function migrateAll(){
  let changed=false;
  for(const dk in appState.days){
    for(const sl in appState.days[dk].turns||{}){
      const t=appState.days[dk].turns[sl]; if(!t) continue;
      t.modules?.operation?.items?.forEach(it=>{ if(it.photos?.some(p=>p?.dataUrl)){it.photos=migrArr(it.photos);changed=true;} });
      (t.modules?.purchases?.receipts||[]).forEach(r=>{
        if(r.photos?.some(p=>p?.dataUrl)){r.photos=migrArr(r.photos);changed=true;}
        if(r.incEvidencePhotos?.some(p=>p?.dataUrl)){r.incEvidencePhotos=migrArr(r.incEvidencePhotos);changed=true;}
        r.incidences?.forEach(x=>{ if(x.incPhoto?.dataUrl){x.incPhoto=storePhoto(x.incPhoto.dataUrl,x.incPhoto.ts);changed=true;} });
        r.newProducts?.forEach(np=>{
          if(np.photoFront?.dataUrl){np.photoFront=storePhoto(np.photoFront.dataUrl,np.photoFront.ts);changed=true;}
          if(np.photoBarcode?.dataUrl){np.photoBarcode=storePhoto(np.photoBarcode.dataUrl,np.photoBarcode.ts);changed=true;}
        });
      });
      t.modules?.inventory?.waste?.forEach(w=>{ if(w.photos?.some(p=>p?.dataUrl)){w.photos=migrArr(w.photos);changed=true;} });
      const s=t.modules?.sales;
      if(s?.photos?.some(p=>p?.dataUrl)){s.photos=migrArr(s.photos);changed=true;}
      s?.withdrawals?.forEach(w=>{ if(w.photos?.some(p=>p?.dataUrl)){w.photos=migrArr(w.photos);changed=true;} });
    }
  }
  if(changed) saveState();
}

function parseDateKey(dk){ const [y,m,d]=String(dk).split("-").map(Number); return new Date(y,m-1,d); }
function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }
function fmtTime(v){

function normalizeText(s){ return String(s??"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ").trim(); }
function resolveSkuName(skuId,fallback){

/* ── Module ensurers ── */
function ensureOp(t){
  if(t.modules.operation) return t.modules.operation;
  const list = t.slot===2?CHECKLIST_CLOSING:CHECKLIST_OPENING;
  const allIds=list.map(x=>x.id);
  // pick 5 random required evidence items (seeded by turn id for consistency)
  const seed=t.id; let rng=0;
  for(const c of seed) rng=(rng*31+c.charCodeAt(0))>>>0;
  const shuffled=[...allIds].sort((a,b)=>{ rng=(rng*1664525+1013904223)>>>0; return (rng&1)?1:-1; });
  const evidIds=shuffled.slice(0,5);
  const mod={startAt:nowISO(),endAt:null,finalized:false,evidenceIds:evidIds,
    items:list.map(x=>({...x,done:false,doneAt:null,note:"",photos:[]}))};
  t.modules.operation=mod; saveState(); return mod;
}
function ensurePurchases(t){
  if(t.modules.purchases) return t.modules.purchases;

/* ── Inventory math ── */
function inventorySlice(rows,dateKey,slot){
  if(!rows?.length) return [];
  const d=parseDateKey(dateKey);
  const totalDays=daysInMonth(d.getFullYear(),d.getMonth()+1);
  const perDay=Math.ceil(rows.length/totalDays);
  const dayStart=(d.getDate()-1)*perDay;
  const dayEnd=Math.min(dayStart+perDay,rows.length);
  const dayRows=rows.slice(dayStart,dayEnd);
  const half=Math.ceil(dayRows.length/2);
  return slot===1?dayRows.slice(0,half):dayRows.slice(half);
}
function inventorySliceInfo(rows,dateKey){
  if(!rows?.length) return {dayStart:0,dayEnd:0,totalSkus:0,perDay:0,totalDays:0,dayOfMonth:0};
  const d=parseDateKey(dateKey);
  const totalDays=daysInMonth(d.getFullYear(),d.getMonth()+1);
  const perDay=Math.ceil(rows.length/totalDays);
  const dayStart=(d.getDate()-1)*perDay;
  return {dayStart,dayEnd:Math.min(dayStart+perDay,rows.length),
    totalSkus:rows.length,perDay,totalDays,dayOfMonth:d.getDate()};
}
function invLineDone(l){ return l&&l.pos!==null&&l.physical!==null; }
function invProgress(inv,skus){
  let done=0;
  for(const s of skus){ const l=inv.lines[String(s.id)]; if(invLineDone(l)) done++; }
  const total=skus.length;
  return {done,total,pct:total?Math.round(done/total*100):0};
}
function getLine(inv,sku){
  const id=String(sku.id);
  if(!inv.lines[id]) inv.lines[id]={pos:null,physical:null,note:"",updatedAt:null};
  return inv.lines[id];
}

/* ── Sales calc ── */
function salesCalc(s){
  const total=Number(s.total||0), card=Number(s.card||0);
  const totalRetiros=(s.withdrawals||[]).filter(w=>w.validated).reduce((a,w)=>a+Number(w.amount||0),0);
  const totalDev=(s.incidences||[]).reduce((a,x)=>a+Number(x.amount||0),0);
  const efectivoVentas=total-card;
  return {total,card,totalRetiros,totalDev,efectivoVentas,efectivoEnCaja:efectivoVentas-totalRetiros,totalCalculado:card+efectivoVentas+totalDev};
}

/* ── Photo picker ── */
function pickPhoto({maxAdd,current,onAdd}){
  return new Promise(resolve=>{
    if(current>=maxAdd){ toast("Límite de fotos alcanzado."); resolve(); return; }
    const inp=document.createElement("input");
    inp.type="file"; inp.accept="image/*"; inp.capture="environment";
    inp.style.cssText="position:fixed;top:-9999px;opacity:0;";
    document.body.appendChild(inp);
    let handled=false;
    async function handle(){
      if(handled) return; handled=true;
      const files=Array.from(inp.files||[]);
      try{ document.body.removeChild(inp); }catch(_){}
      if(!files.length){ resolve(); return; }
      const room=Math.max(0,maxAdd-current);
      const chosen=files.slice(0,room);
      const out=[];
      for(const f of chosen){
        const dataUrl=await compressPhoto(f);
        out.push(storePhoto(dataUrl));
      }
      onAdd(out); resolve();
    }
    inp.addEventListener("change",handle);
    inp.addEventListener("cancel",()=>{ try{document.body.removeChild(inp);}catch(_){} resolve(); });
    setTimeout(()=>inp.click(),60);
  });
}
function compressPhoto(file){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onerror=()=>rej(reader.error);
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const maxW=640,quality=0.60;
        const w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
        const scale=Math.min(1,maxW/Math.max(w,1));
        const nw=Math.round(w*scale), nh=Math.round(h*scale);
        const canvas=document.createElement("canvas");
        canvas.width=nw; canvas.height=nh;
        canvas.getContext("2d").drawImage(img,0,0,nw,nh);
        res(canvas.toDataURL("image/jpeg",quality));
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ── SKU live search ── */
function buildSkuSearch(containerId,hiddenIdEl,hiddenNameEl,badgeEl,onSelect){
  const indexed=catalogStore.rows.map(r=>({
    id:String(r.id??"").trim(),name:String(r.name??"").trim(),
    nid:normalizeText(r.id),nname:normalizeText(r.name)
  })).filter(x=>x.id&&x.name);

  let selId="",lastResults=[],debT=null;
  const cont=$(containerId);
  if(!cont) return;
  const searchEl=cont.querySelector(".skuSearchInput");
  const clearBtn=cont.querySelector(".clearBtn");
  const resultsEl=cont.querySelector(".skuResults");

  function match(q){
    const qn=normalizeText(q); if(!qn) return [];
    const hits=[];
    for(const it of indexed){
      let rank=null;
      if(it.nid.startsWith(qn))rank=0; else if(it.nname.startsWith(qn))rank=1;
      else if(it.nid.includes(qn))rank=2; else if(it.nname.includes(qn))rank=3;
      if(rank!==null) hits.push({it,rank});
    }
    hits.sort((a,b)=>(a.rank-b.rank)||a.it.nname.localeCompare(b.it.nname,"es"));
    return hits.slice(0,30).map(x=>x.it);
  }
  function highlight(s,q){
    if(!q) return escapeHtml(s);
    const qn=normalizeText(q), sn=normalizeText(s);
    const i=sn.indexOf(qn); if(i<0) return escapeHtml(s);
    return escapeHtml(s.slice(0,i))+`<mark class="skuMark">${escapeHtml(s.slice(i,i+q.length))}</mark>`+escapeHtml(s.slice(i+q.length));
  }
  function renderResults(q){
    if(clearBtn) clearBtn.classList.toggle("hidden",!q.trim());
    if(!normalizeText(q)){ lastResults=[]; resultsEl.innerHTML=`<div class="skuResultsMeta">Escribe para buscar…</div>`; return; }
    lastResults=match(q);
    if(!lastResults.length){ resultsEl.innerHTML=`<div class="skuResultsMeta">Sin resultados</div>`; return; }
    resultsEl.innerHTML=`<div class="skuResultsMeta">${lastResults.length} resultado${lastResults.length!==1?"s":""}</div>`+
      lastResults.map((it,i)=>`<div class="skuResultItem" data-sidx="${i}" data-sid="${escapeHtml(it.id)}" data-snm="${escapeHtml(it.name)}">
        <div class="skuPrimary">${highlight(it.name,q)}</div>
        <div class="skuSecondary">${highlight(it.id,q)}</div>
      </div>`).join("");
  }
  function selectSku(id,name){
    selId=id;
    if(hiddenIdEl) hiddenIdEl.value=id;
    if(hiddenNameEl) hiddenNameEl.value=name;
    if(badgeEl) badgeEl.textContent=id+" — "+name;
    if(searchEl){ searchEl.value=name; }
    if(clearBtn) clearBtn.classList.remove("hidden");
    renderResults(name);
    if(onSelect) onSelect(id,name);
  }
  if(searchEl) searchEl.addEventListener("input",()=>{ clearTimeout(debT); debT=setTimeout(()=>renderResults(searchEl.value),120); });
  if(clearBtn) clearBtn.addEventListener("click",()=>{
    selId="";
    if(hiddenIdEl) hiddenIdEl.value="";
    if(hiddenNameEl) hiddenNameEl.value="";
    if(badgeEl) badgeEl.textContent="(sin seleccionar)";
    if(searchEl){ searchEl.value=""; }
    clearBtn.classList.add("hidden");
    lastResults=[]; resultsEl.innerHTML=`<div class="skuResultsMeta">Escribe para buscar…</div>`;
    if(searchEl) searchEl.focus();
  });
  resultsEl.addEventListener("click",e=>{
    const item=e.target.closest("[data-sidx]"); if(!item) return;
    const i=Number(item.getAttribute("data-sidx"));
    const it=lastResults[i]; if(!it) return;
    selectSku(it.id,it.name);
  });
}

/* ════════════════════════════════════════════════════════════
   PHOTO VIEWER
════════════════════════════════════════════════════════════ */
const IV={photos:[],idx:0,scale:1,tx:0,ty:0,_sd:0,_ss:1,_stx:0,_sty:0,_tsx:0,_tsy:0,_swx:0,_lt:0};

function openViewer(photos,startIdx=0){
  if(!photos?.length) return;
  IV.photos=photos; IV.idx=startIdx; IV.scale=1; IV.tx=0; IV.ty=0;
  refreshViewer();
  $('#viewer').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeViewer(){
  $('#viewer').classList.remove('show');
  document.body.style.overflow='';
  const img=$('#vImg'); img.style.transform=''; IV.scale=1; IV.tx=0; IV.ty=0;
}
function refreshViewer(){
  const img=$('#vImg'), ctr=$('#vCounter'), spinner=$('#vSpinner');
  const prev=$('#vPrev'), next=$('#vNext');
  if(!IV.photos.length) return;
  spinner.classList.add('show');
  img.style.transform=''; IV.scale=1; IV.tx=0; IV.ty=0;
  img.onload=()=>spinner.classList.remove('show');
  img.onerror=()=>{ spinner.textContent="⚠️ Error"; };
  img.src=photoSrc(IV.photos[IV.idx])||'';
  ctr.textContent=`${IV.idx+1} / ${IV.photos.length}`;
  prev.style.display=IV.idx>0?'':'none';
  next.style.display=IV.idx<IV.photos.length-1?'':'none';
}
function viewerGo(dir){ const n=IV.idx+dir; if(n<0||n>=IV.photos.length) return; IV.idx=n; refreshViewer(); }
function viewerApply(s,tx,ty){ IV.scale=s; IV.tx=tx; IV.ty=ty; $('#vImg').style.transform=`scale(${s}) translate(${tx}px,${ty}px)`; }

(function setupViewer(){
  window.addEventListener('DOMContentLoaded',()=>{
    const viewer=$('#viewer'), img=$('#vImg');
    $('#vClose').addEventListener('click',closeViewer);
    $('#vPrev').addEventListener('click',()=>viewerGo(-1));
    $('#vNext').addEventListener('click',()=>viewerGo(1));
    $('#vShare').addEventListener('click',async()=>{
      const p=IV.photos[IV.idx]; if(!p) return;
      const src=photoSrc(p); if(!src) return;
      try{
        const res=await fetch(src); const blob=await res.blob();
        const file=new File([blob],`foto_${Date.now()}.jpg`,{type:'image/jpeg'});
        if(navigator.canShare?.({files:[file]})) await navigator.share({files:[file],title:'Foto Bitácora'});
        else{ const a=document.createElement('a'); a.href=src; a.download=`foto_${Date.now()}.jpg`; a.click(); }
      }catch(e){ toast('No se pudo compartir'); }
    });
    img.addEventListener('touchstart',e=>{
      if(e.touches.length===2){
        IV._sd=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
        IV._ss=IV.scale; e.preventDefault();
      } else if(e.touches.length===1){
        const now=Date.now();
        if(now-IV._lt<280){ IV.scale>1?viewerApply(1,0,0):viewerApply(2.5,0,0); e.preventDefault(); }
        IV._lt=now;
        IV._tsx=e.touches[0].clientX; IV._tsy=e.touches[0].clientY;
        IV._stx=IV.tx; IV._sty=IV.ty; IV._swx=e.touches[0].clientX;
      }
    },{passive:false});
    img.addEventListener('touchmove',e=>{
      if(e.touches.length===2){
        e.preventDefault();
        const d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
        viewerApply(Math.min(5,Math.max(1,IV._ss*d/IV._sd)),IV.tx,IV.ty);
      } else if(e.touches.length===1&&IV.scale>1.05){
        e.preventDefault();
        viewerApply(IV.scale,IV._stx+(e.touches[0].clientX-IV._tsx)/IV.scale,IV._sty+(e.touches[0].clientY-IV._tsy)/IV.scale);
      }
    },{passive:false});
    img.addEventListener('touchend',()=>{ if(IV.scale<1.05) viewerApply(1,0,0); });
    viewer.addEventListener('touchstart',e=>{ if(e.touches.length===1) IV._swx=e.touches[0].clientX; },{passive:true});
    viewer.addEventListener('touchend',e=>{
      if(IV.scale>1.1) return;
      const dx=e.changedTouches[0].clientX-IV._swx;
      if(Math.abs(dx)>60) viewerGo(dx<0?1:-1);
    },{passive:true});
  });
})();

/* ════════════════════════════════════════════════════════════
   TAB BAR
════════════════════════════════════════════════════════════ */
const TAB_ROUTES=["operation","purchases","inventory","sales","reports","reportPreview"];
function updateTabBar(){
  const t=activeTurn(), bar=$('#tabBar');
  const inTurn=!!(t&&TAB_ROUTES.includes(rt.route.name));
  bar.classList.toggle('show',inTurn);
  if(!inTurn){ return; }
  const op=t.modules.operation, inv=t.modules.inventory, sales=t.modules.sales;
  const pur=ensurePurchases(t);
  const recFin=(pur.receipts||[]).filter(r=>r.finalized).length;
  const recTot=(pur.receipts||[]).length;
  const cur=rt.route.name;
  const tabs=[
    {id:"operation",icon:"✅",label:t.slot===2?"Cierre":"Apertura",
      on:cur==="operation",
      dot:op?(op.finalized?"g":"w"):""},
    {id:"purchases",icon:"📦",label:"Compras",
      on:cur==="purchases"||cur==="receiptEdit",
      dot:recTot?(recFin===recTot?"g":"w"):""},
    {id:"inventory",icon:"📊",label:"Inventario",
      on:cur==="inventory",
      dot:inv?(inv.finalized?"g":"w"):""},
    {id:"sales",icon:"💰",label:"Ventas",
      on:cur==="sales",
      dot:sales?(sales.finalized?"g":"w"):""},
    {id:"reports",icon:"📄",label:"Reportes",
      on:cur==="reports"||cur==="reportPreview",
      dot:t.status==="closed"?"g":""},
  ];
  bar.innerHTML=tabs.map(tab=>`<button class="tab${tab.on?" on":""}" data-tab="${tab.id}">
    <span class="tab__icon">${tab.icon}</span>
    <span class="tab__label">${tab.label}</span>
    <span class="tab__dot ${tab.dot}"></span>
  </button>`).join("");
}

/* ════════════════════════════════════════════════════════════
   TOPBAR
════════════════════════════════════════════════════════════ */
function updateTopbar(){
  const t=activeTurn(), sub=$('#topbarSub');
  if(!t){ sub.textContent="Hoy: "+dateKeyFrom(new Date()); return; }
  const now=new Date();
  sub.textContent=`${t.branch} · ${t.slotLabel} · ${t.managerName} · ${t.status==="closed"?"CERRADO":"ABIERTO"} · ${pad2(now.getHours())}:${pad2(now.getMinutes())}`;
}
setInterval(updateTopbar,10000);

/* ════════════════════════════════════════════════════════════
   RENDER DISPATCH
════════════════════════════════════════════════════════════ */
function render(){
  closeSheet();
  updateTopbar();
  updateTabBar();
  const {name:r, params:p} = rt.route;
  if(r==="home")       return renderHome();
  if(r==="operation")  return renderOperation();
  if(r==="purchases")  return renderPurchases();
  if(r==="receiptEdit")return renderReceiptEdit(p.id);
  if(r==="inventory")  return renderInventory(p);
  if(r==="sales")      return renderSales();
  if(r==="reports")    return renderReports();
  if(r==="reportPreview") return renderReportPreview();
  if(r==="catalog")    return renderCatalog();
  setRoute("home");
}

function renderInventory(params={}){
  const t=activeTurn(); if(!t) return setRoute("home");
  const locked=isLocked(), inv=ensureInventory(t);
  const rows=catalogStore.rows;
  const hasCat=rows.length>0;
  const filter=params.filter||"all";

  if(!hasCat){
    $('#app').innerHTML=`<div class="card" style="text-align:center;padding:40px 16px;">
      <div style="font-size:48px;margin-bottom:16px;">📊</div>
      <h2 style="margin-bottom:8px;">Sin catálogo</h2>
      <p class="small" style="margin-bottom:20px;">Carga el catálogo de SKUs para hacer inventario.</p>
      <button class="btn primary" data-action="go" data-to="catalog">📂 Ir a Base de datos →</button>
    </div>`;
    showFooter(""); return;
  }

  const todays=inventorySlice(rows,t.dateKey,t.slot);
  const si=inventorySliceInfo(rows,t.dateKey);
  const prog=invProgress(inv,todays);
  const canClose=prog.total>0&&prog.done===prog.total&&!inv.finalized&&!locked;

  const countPending=todays.filter(s=>{ const l=inv.lines[String(s.id)]; return !invLineDone(l); }).length;
  const countDone=prog.done;
  const countDiff=todays.filter(s=>{ const l=inv.lines[String(s.id)]; return invLineDone(l)&&Number(l.physical)!==Number(l.pos); }).length;

  const filtered=filter==="pending"?todays.filter(s=>!invLineDone(inv.lines[String(s.id)])):
    filter==="done"?todays.filter(s=>invLineDone(inv.lines[String(s.id)])):
    filter==="diff"?todays.filter(s=>{ const l=inv.lines[String(s.id)]; return invLineDone(l)&&Number(l.physical)!==Number(l.pos); }):
    todays;

  const skuHtml=filtered.map(s=>{
    const l=inv.lines[String(s.id)];
    const done=invLineDone(l);
    const hasDiff=done&&Number(l.physical)!==Number(l.pos);
    const diff=done?Number(l.physical)-Number(l.pos):null;
    return `<div class="invRow ${done?(hasDiff?"diff":"done"):""}" data-action="editSku" data-sku="${escapeHtml(s.id)}">
      <div class="invRow__check">${done?"✓":""}</div>
      <div class="invRow__body">
        <div class="invRow__name">${escapeHtml(s.name)}</div>
        <div class="invRow__id">${escapeHtml(s.id)}</div>
        ${done?`<div class="invRow__counts">
          <div class="invCount"><div class="invCount__val">${l.pos}</div><div class="invCount__lbl">POS</div></div>

/* ════════════════════════════════════════════════════════════
   REPORT BUILDERS
════════════════════════════════════════════════════════════ */
function wrapReport(title, body){
  return `<!doctype html><html lang="es"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>${title}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1f2937;padding:20px;background:#fff;}
h1{font-size:20px;font-weight:800;margin-bottom:16px;color:#111827;}
h2{font-size:16px;font-weight:700;margin:20px 0 10px;padding-bottom:6px;border-bottom:2px solid #e5e7eb;color:#1f2937;}
h3{font-size:14px;font-weight:700;margin:14px 0 8px;color:#374151;}
p{margin:5px 0;line-height:1.6;}
table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px;}
th{background:#f9fafb;text-align:left;padding:8px 10px;border:1px solid #e5e7eb;font-weight:700;}
td{padding:7px 10px;border:1px solid #e5e7eb;}
.meta{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:14px;margin-bottom:16px;}
.box{border:1px solid #e5e7eb;border-radius:8px;padding:14px;margin:10px 0;}
.ok{color:#16a34a;font-weight:700;} .warn{color:#d97706;font-weight:700;} .err{color:#dc2626;font-weight:700;}
img{max-width:100%;height:auto;border-radius:6px;margin:6px 0;display:block;}
.photoCaption{font-size:12px;color:#6b7280;margin-bottom:10px;}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700;background:#f3f4f6;border:1px solid #d1d5db;}
.badge.ok{background:#dcfce7;border-color:#86efac;color:#166534;}
.badge.warn{background:#fef3c7;border-color:#fde68a;color:#92400e;}
.section-divider{border:none;border-top:2px solid #e5e7eb;margin:24px 0;}
@media print{body{padding:10px;}img{max-width:300px;}}
</style></head><body>${body}</body></html>`;
}
function metaBox(t,extra=""){
  return `<div class="meta">
    <p><strong>Turno:</strong> ${escapeHtml(t.slotLabel)} — ${escapeHtml(t.branch)}</p>
    <p><strong>Encargado:</strong> ${escapeHtml(t.managerName)}</p>
    <p><strong>Fecha:</strong> ${escapeHtml(t.dateKey)}</p>
    <p><strong>Apertura:</strong> ${fmtTime(t.startedAt)}${t.closedAt?" · Cierre: "+fmtTime(t.closedAt):""}</p>
    ${extra}
  </div>`;
}
function photoFig(p,cap=""){
  const src=photoSrc(p); if(!src) return "";
  return `<img src="${src}" alt="${escapeHtml(cap)}"/><p class="photoCaption">${escapeHtml(cap)} · ${fmtTime(p.ts)}</p>`;
}

function buildOpReport(t){
  const op=t.modules.operation; if(!op) return wrapReport("Apertura",`<h1>Sin datos.</h1>`);
  const opLabel=t.slot===2?"Cierre/Operación":"Apertura/Operación";
  const need=new Set(op.evidenceIds||[]);
  const done=op.items.filter(x=>x.done), pending=op.items.filter(x=>!x.done);
  const checkHtml=op.items.map(it=>{
    const req=need.has(it.id), photos=it.photos||[];
    return `<div class="box">
      <p><span class="badge ${it.done?"ok":"warn"}">${it.done?"✓ OK":"Pendiente"}</span>
         ${it.doneAt?` <span class="badge">🕐 ${fmtTime(it.doneAt)}</span>`:""}
         ${req?` <span class="badge ${photos.length?"ok":"warn"}">📷 ${photos.length?"Foto OK":"Sin foto"}</span>`:""}</p>
      <h3>${escapeHtml(it.label)}</h3>
      ${it.note?`<p><strong>Nota:</strong> ${escapeHtml(it.note)}</p>`:""}
      ${photos.map((p,i)=>photoFig(p,`${it.label} · foto ${i+1}`)).join("")}
    </div>`;
  }).join("");
  return wrapReport(opLabel,`<h1>Reporte: ${opLabel}</h1>
    ${metaBox(t,`<p><strong>Inicio:</strong> ${fmtTime(op.startAt)} · <strong>Fin:</strong> ${op.endAt?fmtTime(op.endAt):"(en proceso)"}</p>
    <p><strong>Completados:</strong> ${done.length}/${op.items.length}</p>`)}
    <h2>Checklist ${t.slot===2?"de cierre":"de apertura"}</h2>${checkHtml}`);
}

function buildReceiptReport(t,r){
  const incHtml=r.incidences?.length?`<table><thead><tr><th>Producto</th><th>Cant.</th><th>Motivo</th><th>Evidencia</th></tr></thead><tbody>
    ${r.incidences.map(x=>`<tr><td>${escapeHtml(x.desc||"")}</td><td>${escapeHtml(x.qty||"")}</td><td>${escapeHtml(x.reason||"")}</td>
    <td>${x.incPhoto?`<img src="${photoSrc(x.incPhoto)}" style="width:100px;height:auto;"/>`:"-"}</td></tr>`).join("")}
  </tbody></table>`:`<p>Sin incidencias.</p>`;
  const npHtml=(r.newProducts||[]).length?`<h2 style="color:#7c3aed;">Productos no registrados en BD</h2>
    <table><thead><tr><th>Nombre</th><th>Cant.</th><th>Frente</th><th>Código</th></tr></thead><tbody>
    ${r.newProducts.map(np=>`<tr><td>${escapeHtml(np.name||"")}</td><td>${np.qty||""}</td>

function buildInvReport(t){
  const inv=t.modules.inventory; if(!inv) return wrapReport("Inventario",`<h1>Sin datos.</h1>`);
  const rows=catalogStore.rows;
  const todays=inventorySlice(rows,t.dateKey,t.slot);
  const si=inventorySliceInfo(rows,t.dateKey);
  const prog=invProgress(inv,todays);
  const allLines=todays.map(s=>({s,l:inv.lines[String(s.id)]||{pos:null,physical:null,note:""}}));
  const validated=allLines.filter(({l})=>invLineDone(l));
  const pending=allLines.filter(({l})=>!invLineDone(l));
  const diffs=validated.filter(({l})=>Number(l.physical)!==Number(l.pos))
    .map(({s,l})=>({s,l,diff:Number(l.physical)-Number(l.pos)}))
    .sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
  const waste=inv.waste||[];
  const diffTable=diffs.length?`<table><thead><tr><th>ID</th><th>Artículo</th><th>POS</th><th>Físico</th><th>Dif.</th><th>Acción</th></tr></thead><tbody>
    ${diffs.map(({s,l,diff})=>`<tr><td>${escapeHtml(s.id)}</td><td>${escapeHtml(s.name)}</td>
    <td>${l.pos}</td><td>${l.physical}</td>
    <td class="${diff>0?"ok":"err"}">${diff>0?"+":""}${diff}</td>
    <td>${diff>0?"Sobrante — revisar POS":"Faltante — ajustar/merma"}</td></tr>`).join("")}
  </tbody></table>`:`<p class="ok">Sin diferencias. ✓</p>`;
  const wasteHtml=waste.length?waste.map((w,i)=>{
    const name=resolveSkuName(w.skuId,w.skuName);
    return `<div class="box"><span class="badge warn">Merma ${i+1}</span>
      <h3>${escapeHtml(w.skuId)} — ${escapeHtml(name)}</h3>
      <p><strong>Cantidad:</strong> ${escapeHtml(w.qty)} · <strong>Motivo:</strong> ${escapeHtml(w.reason||"")}</p>
      ${w.note?`<p><strong>Nota:</strong> ${escapeHtml(w.note)}</p>`:""}
      ${(w.photos||[]).map((p,j)=>photoFig(p,`Merma · foto ${j+1}`)).join("")}
    </div>`;
  }).join(""):`<p>Sin mermas.</p>`;
  return wrapReport("Inventario",`<h1>Reporte de Inventario</h1>
    ${metaBox(t,`<p><strong>Día ${si.dayOfMonth}/${si.totalDays} — Turno ${t.slot===2?"Cierre":"Apertura"}</strong></p>
    <p><strong>Validados:</strong> ${prog.done}/${prog.total} (${prog.pct}%) · <strong>Diferencias:</strong> ${diffs.length} · <strong>Mermas:</strong> ${waste.length}</p>
    <p><strong>Mes cubierto:</strong> ${si.dayEnd}/${si.totalSkus} (${Math.round(si.dayEnd/si.totalSkus*100)}%)</p>`)}
    <h2>Diferencias detectadas</h2>${diffTable}
    <h2>Mermas del turno (${waste.length})</h2>${wasteHtml}
    <h2>Validados (${validated.length})</h2>
    ${validated.length?`<table><thead><tr><th>ID</th><th>Artículo</th><th>POS</th><th>Físico</th><th>Dif.</th><th>Nota</th></tr></thead><tbody>
    ${validated.map(({s,l})=>{const d=Number(l.physical)-Number(l.pos);return `<tr><td>${escapeHtml(s.id)}</td><td>${escapeHtml(s.name)}</td>
    <td>${l.pos}</td><td>${l.physical}</td><td class="${d>0?"ok":d<0?"err":""}">${d!==0?(d>0?"+":"")+d:"—"}</td><td>${escapeHtml(l.note||"")}</td></tr>`;}).join("")}
    </tbody></table>`:"<p>Ninguno.</p>"}
    ${pending.length?`<h2>Pendientes sin validar (${pending.length})</h2>
    <table><thead><tr><th>ID</th><th>Artículo</th></tr></thead><tbody>
    ${pending.map(({s})=>`<tr><td>${escapeHtml(s.id)}</td><td>${escapeHtml(s.name)}</td></tr>`).join("")}
    </tbody></table>`:""}`);
}

function buildSalesReport(t){
  const s=t.modules.sales; if(!s) return wrapReport("Ventas",`<h1>Sin datos.</h1>`);
  const calc=salesCalc(s);
  const wTable=(s.withdrawals||[]).length?`<table><thead><tr><th>Cajer@</th><th>Monto</th><th>Hora</th><th>Validado</th></tr></thead><tbody>
    ${(s.withdrawals||[]).map(w=>`<tr><td>${escapeHtml(w.cashier||"")}</td><td>${fmtMoney(w.amount)}</td>
    <td>${fmtTime(w.ts)}</td><td>${w.validated?"✓ Sí":"—"}</td></tr>`).join("")}
    <tr><td colspan="4"><strong>Total retiros validados: ${fmtMoney(calc.totalRetiros)}</strong></td></tr>
  </tbody></table>`:`<p>Sin retiros.</p>`;
  const incTable=(s.incidences||[]).length?`<table><thead><tr><th>Producto</th><th>Motivo</th><th>Cant.</th><th>Monto</th></tr></thead><tbody>
    ${(s.incidences||[]).map(x=>`<tr><td>${escapeHtml(resolveSkuName(x.skuId,x.skuName))}</td>

  </tbody></table>`:`<p>Sin devoluciones.</p>`;
  return wrapReport("Ventas/Corte",`<h1>Reporte: Ventas / Corte de Caja</h1>
    ${metaBox(t,`<p><strong>Cajer@:</strong> ${escapeHtml(s.cashier||"(no especificado)")}</p>
    <p><strong>Inicio corte:</strong> ${s.startAt?fmtTime(s.startAt):"—"}</p>`)}
    <div class="box" style="background:#f0fdf4;border-color:#86efac;">
      <h2 style="border:none;margin-top:0;color:#14532d;">Resumen de caja</h2>
      <p><strong>Ventas totales:</strong> ${fmtMoney(calc.total)}</p>
      <p><strong>Tarjeta:</strong> ${fmtMoney(calc.card)}</p>

        <strong>Efectivo esperado: <span style="color:#16a34a;">${fmtMoney(calc.efectivoEnCaja)}</span></strong></p>
    </div>
    <h2>Retiros de efectivo</h2>${wTable}
    <h2>Devoluciones</h2>${incTable}
    ${s.notes?`<h2>Notas</h2><p>${escapeHtml(s.notes)}</p>`:""}
    <h2>Evidencia del corte</h2>
    ${(s.photos||[]).length?(s.photos||[]).map((p,i)=>photoFig(p,`Corte · foto ${i+1}`)).join(""):"<p>Sin fotos.</p>"}
    ${(s.withdrawals||[]).filter(w=>w.photos?.length).map(w=>w.photos.map((p,j)=>photoFig(p,`Retiro ${fmtTime(w.ts)} · foto ${j+1}`)).join("")).join("")}`);
}

function buildFinalReport(t){
  const op=t.modules.operation, pur=ensurePurchases(t), inv=t.modules.inventory, sales=t.modules.sales;
  const recs=pur.receipts||[], waste=inv?.waste||[];
  const calc=sales?salesCalc(sales):null;
  const todays=inv&&catalogStore.rows.length?inventorySlice(catalogStore.rows,t.dateKey,t.slot):[];
  const invProg=inv?invProgress(inv,todays):{done:0,total:0,pct:0};
  const opLabel=t.slot===2?"Cierre/Operación":"Apertura/Operación";
  const statusRow=(label,ok,detail)=>`<tr>
    <td>${label}</td>
    <td class="${ok?"ok":"warn"}">${ok?"✅ Listo":"⏳ Pendiente"}</td>
    <td style="color:#6b7280;">${detail}</td></tr>`;
  return wrapReport("Reporte Final",`<h1>Reporte Final del Turno</h1>
    ${metaBox(t,`<p><strong>Estado:</strong> <span class="${t.status==="closed"?"err":"ok"}">${t.status==="closed"?"CERRADO":"ABIERTO"}</span></p>`)}
    <h2>Resumen de módulos</h2>
    <table><thead><tr><th>Módulo</th><th>Estado</th><th>Detalle</th></tr></thead><tbody>
      ${statusRow(opLabel,op?.finalized,op?`${op.items?.filter(x=>x.done).length||0}/${op.items?.length||0} puntos`:"—")}
      ${statusRow("Compras",recs.length?recs.every(r=>r.finalized):false,recs.length?`${recs.filter(r=>r.finalized).length}/${recs.length} facturas · ${fmtMoney(recs.reduce((a,r)=>a+Number(r.amount||0),0))}`:"Sin facturas")}
      ${statusRow("Inventario",inv?.finalized,inv?`${invProg.done}/${invProg.total} (${invProg.pct}%) · ${waste.length} mermas`:"—")}
      ${statusRow("Ventas/Corte",sales?.finalized,calc?`${fmtMoney(calc.total)} ventas · ${fmtMoney(calc.efectivoEnCaja)} efectivo`:"—")}
    </tbody></table>
    ${calc?`<h2>Resumen de caja</h2>
    <div class="box" style="background:#f0fdf4;border-color:#86efac;">
      <p><strong>Ventas totales:</strong> ${fmtMoney(calc.total)}</p>
      <p><strong>Tarjeta:</strong> ${fmtMoney(calc.card)}</p>
      <p><strong>Retiros:</strong> ${fmtMoney(calc.totalRetiros)}</p>
      <p style="font-size:16px;margin-top:8px;border-top:1px solid #86efac;padding-top:8px;">
        <strong>Efectivo en caja: <span style="color:#16a34a;">${fmtMoney(calc.efectivoEnCaja)}</span></strong></p>
    </div>`:""}
    ${recs.length?`<h2>Facturas</h2>
    <table><thead><tr><th>Proveedor</th><th>Factura</th><th>Monto</th><th>Estado</th></tr></thead><tbody>
    ${recs.map(r=>`<tr><td>${escapeHtml(r.supplier||"—")}</td><td>${escapeHtml(r.invoiceNo||"—")}</td>
    <td>${fmtMoney(r.amount)}</td><td class="${r.finalized?"ok":"warn"}">${r.finalized?"✅":"⏳"}</td></tr>`).join("")}
    <tr><td colspan="3"><strong>Total</strong></td><td><strong>${fmtMoney(recs.reduce((a,r)=>a+Number(r.amount||0),0))}</strong></td></tr>
    </tbody></table>`:""}
    ${waste.length?`<h2>Mermas (${waste.length})</h2>
    <table><thead><tr><th>SKU</th><th>Artículo</th><th>Cant.</th><th>Motivo</th></tr></thead><tbody>
    ${waste.map(w=>`<tr><td>${escapeHtml(w.skuId)}</td><td>${escapeHtml(resolveSkuName(w.skuId,w.skuName))}</td>
    <td>${escapeHtml(w.qty)}</td><td>${escapeHtml(w.reason||"")}</td></tr>`).join("")}
    </tbody></table>`:""}
  `);
}

function sheetEditSku(skuId){
  const t=activeTurn(); if(!t||!catalogStore.rows.length) return;
  const inv=ensureInventory(t);
  const todays=inventorySlice(catalogStore.rows,t.dateKey,t.slot);
  const sku=todays.find(s=>String(s.id)===String(skuId));
  if(!sku){ toast("SKU no corresponde a este turno."); return; }
  const line=getLine(inv,sku);
  const done=invLineDone(line);
  openSheet(`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">
      <div>
        <div style="font-weight:800;font-size:17px;">${escapeHtml(sku.name)}</div>
        <div class="small">${escapeHtml(sku.id)}</div>
      </div>
      ${done?`<span class="pill g">✓ Validado</span>`:`<span class="pill w">Pendiente</span>`}
    </div>
    <div style="background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:14px;color:#93c5fd;">
      1️⃣ Busca la cantidad en el <strong>POS</strong>. &nbsp; 2️⃣ Cuenta el físico.
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px;">
      <div>
        <div class="label" style="margin-top:0;">POS (sistema) *</div>
        <input class="input" id="skuPos" inputmode="numeric" value="${escapeHtml(line.pos||"")}"
          placeholder="0" style="text-align:center;font-size:24px;font-weight:800;padding:14px 8px;" ${isLocked()?"disabled":""}/>
      </div>
      <div>
        <div class="label" style="margin-top:0;">Físico (conteo) *</div>
        <input class="input" id="skuPhy" inputmode="numeric" value="${escapeHtml(line.physical||"")}"
          placeholder="0" style="text-align:center;font-size:24px;font-weight:800;padding:14px 8px;" ${isLocked()?"disabled":""}/>
      </div>
    </div>
    <div id="diffPreview"></div>
    <div class="label">Nota</div>
    <input class="input" id="skuNote" value="${escapeHtml(line.note||"")}" placeholder="Observación…" ${isLocked()?"disabled":""}/>
    <div class="hr"></div>
    ${!isLocked()?`<button class="btn good" data-action="saveSku" data-sku="${escapeHtml(sku.id)}" style="margin-bottom:10px;">✓ Guardar</button>`:""}
    <button class="btn" data-action="sheetClose">${isLocked()?"Cerrar":"Cancelar"}</button>
  `);
  function upd(){
    const pos=$('#skuPos')?.value.trim(), phy=$('#skuPhy')?.value.trim(), el=$('#diffPreview');
    if(!el||pos===""||phy===""){if(el){el.style.cssText="";el.textContent="";}return;}
    const d=Number(phy)-Number(pos);
    if(d===0){el.style.cssText="background:rgba(34,197,94,.1);color:var(--green);padding:10px;border-radius:10px;";el.textContent="✓ Sin diferencia";}
    else if(d>0){el.style.cssText="background:rgba(245,158,11,.1);color:var(--amber);padding:10px;border-radius:10px;";el.textContent=`▲ Sobrante: +${d} unidades`;}
    else{el.style.cssText="background:rgba(239,68,68,.1);color:var(--red);padding:10px;border-radius:10px;";el.textContent=`▼ Faltante: ${d} unidades`;}
  }
  ['#skuPos','#skuPhy'].forEach(sel=>{
    const el=$(sel); if(el){ el.addEventListener('input',upd); el.addEventListener('change',upd); }
  });
  upd();
}

/* ════════════════════════════════════════════════════════════
   SHARE / DOWNLOAD
════════════════════════════════════════════════════════════ */
async function shareOrDownload(files,{title="Bitácora",text="Reporte"}={}){
  try{
    if(navigator.canShare?.({files})){ await navigator.share({files,title,text}); return true; }
  }catch(e){}
  for(const f of files){
    const url=URL.createObjectURL(f);
    const a=document.createElement('a'); a.href=url; a.download=f.name; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }
  return false;
}

/* ════════════════════════════════════════════════════════════
   CSV PARSER
════════════════════════════════════════════════════════════ */
function parseCatalogCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length) return [];
  const header=lines[0].split(/[,;\t]/).map(h=>h.trim().toLowerCase().replace(/"/g,""));
  const idC=header.findIndex(h=>h==="id"||h==="codigo"||h==="sku"||h==="clave");
  const nmC=header.findIndex(h=>h.includes("art")||h.includes("nombre")||h.includes("name")||h.includes("desc"));
  if(idC<0||nmC<0) return [];
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const cols=lines[i].split(/[,;\t]/).map(c=>c.trim().replace(/^"|"$/g,""));
    const id=String(cols[idC]||"").trim(), name=String(cols[nmC]||"").trim();
    if(id&&name) rows.push({id,name});
  }
  return rows;
}

async function handleAction(action,el,e){
  const t=activeTurn();

  /* ── GLOBAL ── */

  if(action==="viewPhoto"){
    const vk=el.getAttribute('data-vk'), idx=Number(el.getAttribute('data-idx')||0);
    const photos=_vStore[vk]; if(photos?.length) openViewer(photos,idx); return;
  }
  if(action==="go"){
    const to=el.getAttribute('data-to');
    if(to==="catalog") pushRoute('catalog');

  /* ── HOME ── */

  if(action==="stConfirm"){
    const slot=Number(el.getAttribute('data-slot'));
    const name=($('#stName')?.value||"").trim(), branch=($('#stBranch')?.value||"").trim();
    if(!name) return toast("Nombre obligatorio.");
    if(!branch) return toast("Sucursal obligatoria.");

    const ref=findOpenTurnToday(); if(!ref) return toast("No hay turno abierto.");
    rt.active=ref; setRoute('operation'); return;

  if(action==="enterTurn"){
    const slot=Number(el.getAttribute('data-slot')), dk=dateKeyFrom(new Date());
    if(!getTurn(dk,slot)) return toast("Turno no existe.");
    rt.active={dateKey:dk,slot}; setRoute('operation'); return;

  if(action==="viewFinal"){
    const slot=Number(el.getAttribute('data-slot')), dk=dateKeyFrom(new Date());

    pushRoute('reportPreview'); return;

  if(action==="importCatalog"){ $('#csvPicker').value=""; $('#csvPicker').click(); return; }

    if(!confirm("¿Eliminar el catálogo? Esto afectará el inventario.")) return;
    catalogStore={rows:[],source:"",importedAt:null}; saveCatalog(); toast("Catálogo eliminado."); render(); return;
  }

  /* ── OPERATION ── */

    if(isLocked()) return;
    if(e.target.closest('button,input,textarea,select,a')) return;
    const op=ensureOp(t), id=el.getAttribute('data-id');
    const it=op.items.find(x=>x.id===id); if(!it) return;
    const need=new Set(op.evidenceIds||[]);
    if(!it.done&&need.has(id)&&!it.photos?.length){ toast("⚠ Este punto requiere foto antes de marcar."); return; }
    it.done=!it.done; if(it.done) it.doneAt=nowISO(); else it.doneAt=null;
    saveState(); render(); return;
  }
  if(action==="opAddPhoto"){
    if(isLocked()) return;
    const op=ensureOp(t), id=el.getAttribute('data-id');
    const it=op.items.find(x=>x.id===id); if(!it) return;
    await pickPhoto({maxAdd:LIMITS.opPhoto,current:it.photos.length,onAdd:photos=>{
      it.photos=it.photos.concat(photos).slice(0,LIMITS.opPhoto); saveState(); render();

    if(isLocked()) return;
    const s=ensureSales(t);
    await pickPhoto({maxAdd:LIMITS.salesPhotos,current:s.photos.length,onAdd:photos=>{s.photos=s.photos.concat(photos).slice(0,LIMITS.salesPhotos);saveState();render();}}); return;
  }
  if(action==="delSalesPhoto"){
    if(isLocked()) return;
    const s=ensureSales(t); s.photos.splice(Number(el.getAttribute('data-idx')),1); saveState(); render(); return;
  }
  if(action==="addInc2"){ sheetIncSales(null); return; }
  if(action==="editInc"){ sheetIncSales(el.getAttribute('data-id')); return; }
  if(action==="delInc2"){
    if(isLocked()) return;
    const s=ensureSales(t); s.incidences=s.incidences.filter(x=>x.id!==el.getAttribute('data-id'));
    saveState(); render(); return;
  }
  if(action==="incSave"){
    const s=ensureSales(t);
    const editId=$('#incEditId')?.value||"";
    const skuId=($('#incSkuId')?.value||"").trim();
    const skuName=($('#incSkuName')?.value||"").trim(); if(!skuName) return toast("Selecciona un producto.");
    const reason=($('#incReason')?.value||"").trim(); if(!reason) return toast("Motivo obligatorio.");
    const qtyRaw=($('#incQty')?.value||"").trim();
    const qty=qtyRaw===""?null:Number(qtyRaw); if(qty!==null&&(!isFinite(qty)||qty<=0)) return toast("Cantidad inválida.");
    const amtRaw=($('#incAmt')?.value||"").trim();
    const amount=amtRaw===""?0:parseMoney(amtRaw);
    if(editId){
      const inc=(s.incidences||[]).find(x=>x.id===editId);
      if(inc){inc.skuId=skuId;inc.skuName=skuName;inc.reason=reason;inc.qty=qty;inc.amount=amount;}
    } else {
      s.incidences.push({id:uid(),skuId,skuName,reason,qty,amount});
    }
    saveState(); closeSheet(); render(); return;
  }
  if(action==="finalizeSales"){
    if(isLocked()) return;
    const s=ensureSales(t);
    if(!s.corteStarted) return toast("Inicia el corte primero.");
    if(!s.cashier?.trim()) return toast("Cajer@ obligatorio.");
    if(!isFinite(Number(s.total))||Number(s.total)<0) return toast("Ventas totales inválidas.");
    if(!isFinite(Number(s.card))||Number(s.card)<0) return toast("Ventas tarjeta inválidas.");
    if(!s.photos?.length) return toast("Foto del corte obligatoria.");
    s.finalized=true; s.endAt=nowISO(); saveState(); toast("Corte finalizado."); render(); return;
  }
  if(action==="salesSend"){
    if(!t?.modules?.sales) return toast("Sin datos de ventas.");
    rt.report={title:"Ventas/Corte",filename:`ventas_${t.dateKey}_${t.slot}.html`,html:buildSalesReport(t)};
    pushRoute('reportPreview'); return;
  }

  /* ── REPORTS ── */
  if(action==="previewOp"){
    const op=t?.modules?.operation; if(!op||!op.finalized) return;
    rt.report={title:`${t.slot===2?"Cierre":"Apertura"}/Operación`,filename:`apertura_${t.dateKey}_${t.slot}.html`,html:buildOpReport(t)};
    pushRoute('reportPreview'); return;
  }
  if(action==="previewInv"){
    if(!t?.modules?.inventory) return;
    rt.report={title:"Inventario",filename:`inventario_${t.dateKey}_${t.slot}.html`,html:buildInvReport(t)};
    pushRoute('reportPreview'); return;
  }
  if(action==="previewSales"){
    if(!t?.modules?.sales) return;
    rt.report={title:"Ventas/Corte",filename:`ventas_${t.dateKey}_${t.slot}.html`,html:buildSalesReport(t)};
    pushRoute('reportPreview'); return;
  }
  if(action==="previewFinal"){
    rt.report={title:"Reporte Final",filename:`final_${t.dateKey}_${t.slot}.html`,html:buildFinalReport(t)};
    pushRoute('reportPreview'); return;
  }
  if(action==="closeTurnAndSend"){
    if(!t) return;
    if(t.status==="closed"){ toast("Turno ya cerrado."); return; }
    closeTurn(t.dateKey,t.slot);
    const t2=activeTurn();
    const file=new File([buildFinalReport(t2)],`final_${t2.dateKey}_${t2.slot}.html`,{type:'text/html'});
    const ok=await shareOrDownload([file],{title:"Reporte Final",text:"Turno"});
    if(!ok) toast("Archivo descargado. Turno cerrado."); else toast("Turno finalizado y enviado.");
    setRoute('reports'); return;
  }
  if(action==="sendReport"){
    if(!rt.report) return;
    const file=new File([rt.report.html],rt.report.filename,{type:'text/html'});
    const ok=await shareOrDownload([file],{title:rt.report.title,text:"Reporte"});
    if(!ok) toast("Archivo descargado."); return;
  }
  if(action==="downloadReport"){
    if(!rt.report) return;
    const a=document.createElement('a'); a.href='data:text/html;charset=utf-8,'+encodeURIComponent(rt.report.html);
    a.download=rt.report.filename; a.click(); return;
  }
  if(action==="printReport"){
    try{ $('#reportFrame').contentWindow.focus(); $('#reportFrame').contentWindow.print(); }
    catch(_){ window.print(); } return;
  }
}

function handleInput(action,el){
  const t=activeTurn(); if(!t) return;
  if(action==="opNote"){
    if(isLocked()) return;
    const op=ensureOp(t), it=op.items.find(x=>x.id===el.getAttribute('data-id'));
    if(it){it.note=el.value||"";saveState();}return;
  }
  if(action==="rcptSupplier"||action==="rcptInvoiceNo"||action==="rcptAmount"){
    if(isLocked()) return;
    const r=findReceipt(t,el.getAttribute('data-id')); if(!r) return;
    if(action==="rcptSupplier") r.supplier=el.value||"";
    else if(action==="rcptInvoiceNo") r.invoiceNo=el.value||"";
    else if(action==="rcptAmount"){const n=parseMoney(el.value);if(isFinite(n))r.amount=n;}
    saveState(); return;
  }
  if(action==="incDesc"||action==="incQty"||action==="incReason"){
    if(isLocked()) return;
    const r=findReceipt(t,el.getAttribute('data-id')),inc=(r?.incidences||[]).find(x=>x.id===el.getAttribute('data-inc')); if(!inc) return;
    if(action==="incDesc") inc.desc=el.value||"";
    else if(action==="incQty") inc.qty=el.value||"";
    else if(action==="incReason") inc.reason=el.value||"";
    saveState(); return;
  }
  if(action==="npName"||action==="npQty"){
    if(isLocked()) return;
    const r=findReceipt(t,el.getAttribute('data-id')),np=(r?.newProducts||[]).find(x=>x.id===el.getAttribute('data-np')); if(!np) return;
    if(action==="npName") np.name=el.value||"";
    else if(action==="npQty") np.qty=el.value||"";
    saveState(); return;
  }
  if(action==="salesCashier"||action==="salesTotal"||action==="salesCard"||action==="salesNotes"){
    if(isLocked()) return;
    const s=ensureSales(t);
    if(action==="salesCashier") s.cashier=el.value||"";
    else if(action==="salesTotal"){const n=parseMoney(el.value);if(isFinite(n))s.total=n;}
    else if(action==="salesCard"){const n=parseMoney(el.value);if(isFinite(n))s.card=n;}
    else if(action==="salesNotes") s.notes=el.value||"";
    saveState(); return;
  }
}

/* ── CSV picker ── */
$('#csvPicker').addEventListener('change',async e=>{
  const f=e.target.files?.[0]; if(!f) return;
  try{
    const text=await f.text();
    const rows=parseCatalogCSV(text);
    if(!rows.length){ toast("CSV sin filas válidas (se necesitan columnas ID y Artículo)."); return; }
    catalogStore={rows,source:f.name,importedAt:nowISO()};
    saveCatalog(); toast(`✅ Catálogo: ${rows.length} SKUs.`); render();
  }catch(ex){ toast("Error al leer CSV: "+ex.message); }
});

migrateAll();
purgeOldData();
setTimeout(()=>{
  const total=(JSON.stringify(appState).length+JSON.stringify(photoStore).length)/1024;
  if(total>4200) toast(`⚠ Storage al ${Math.round(total/51.2)}% — libera fotos antiguas`,4000);
},2000);
const _ref=findOpenTurnToday();
if(_ref){ rt.active=_ref; rt.route={name:'operation',params:{}}; }
else { rt.route={name:'home',params:{}}; }
render();

})();
